<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fdf6ec">
  <title>朝ダッシュボード</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" id="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div id="greeting" class="header__greeting"></div>
    <div id="date" class="header__date"></div>
    <div id="day" class="header__day"></div>
  </header>

  <!-- グローバルナビゲーション -->
  <nav class="global-nav">
    <button class="global-nav__btn global-nav__btn--active" data-page="weather">
      <span class="global-nav__icon">🌤</span>
      <span class="global-nav__label">天気</span>
    </button>
    <button class="global-nav__btn" data-page="news">
      <span class="global-nav__icon">📰</span>
      <span class="global-nav__label">ニュース</span>
    </button>
    <button class="global-nav__btn" data-page="delay">
      <span class="global-nav__icon">🚃</span>
      <span class="global-nav__label">遅延情報</span>
    </button>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main">

    <!-- 天気ページ -->
    <div class="page page--active" id="page-weather">
      <section class="card weather">
        <h2 class="card__title">
          <span class="card__title-icon">🌤</span> 今日の天気
        </h2>
        <div id="weather-content">
          <div class="loading"><div class="loading__spinner"></div>読み込み中...</div>
        </div>
      </section>
    </div>

    <!-- ニュースページ -->
    <div class="page" id="page-news">
      <section class="card news">
        <h2 class="card__title">
          <span class="card__title-icon">📰</span> 今日のニュース
        </h2>
        <nav class="news-tabs">
          <button class="news-tabs__btn news-tabs__btn--active" data-category="popular">人気</button>
          <button class="news-tabs__btn" data-category="economy">経済</button>
          <button class="news-tabs__btn" data-category="it">IT</button>
          <button class="news-tabs__btn" data-category="sports">スポーツ</button>
          <button class="news-tabs__btn" data-category="entertainment">エンタメ</button>
          <button class="news-tabs__btn" data-category="world">国際</button>
        </nav>
        <div id="news-list">
          <div class="loading"><div class="loading__spinner"></div>読み込み中...</div>
        </div>
      </section>

      <section class="card news">
        <h2 class="card__title">
          <span class="card__title-icon">📅</span> 今週のニュース
        </h2>
        <nav class="news-tabs" id="weekly-news-tabs">
          <button class="news-tabs__btn news-tabs__btn--active" data-category="weekly-popular">人気</button>
          <button class="news-tabs__btn" data-category="weekly-economy">経済</button>
          <button class="news-tabs__btn" data-category="weekly-it">IT</button>
          <button class="news-tabs__btn" data-category="weekly-sports">スポーツ</button>
          <button class="news-tabs__btn" data-category="weekly-entertainment">エンタメ</button>
          <button class="news-tabs__btn" data-category="weekly-world">国際</button>
        </nav>
        <div id="weekly-news-list">
          <div class="loading"><div class="loading__spinner"></div>読み込み中...</div>
        </div>
      </section>
    </div>

    <!-- 遅延情報ページ -->
    <div class="page" id="page-delay">
      <section class="card delay">
        <h2 class="card__title">
          <span class="card__title-icon">🚃</span> 現在の遅延情報
        </h2>
        <div id="delay-content">
          <div class="loading"><div class="loading__spinner"></div>読み込み中...</div>
        </div>
      </section>
    </div>

  </main>

  <footer class="footer">朝ダッシュボード &copy; 2026</footer>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
